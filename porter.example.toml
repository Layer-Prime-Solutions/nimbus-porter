# Porter — Example Configuration
#
# Copy this file to porter.toml and customize for your setup:
#   cp porter.example.toml porter.toml
#
# Start Porter:
#   porter serve                       # HTTP server on localhost:3000
#   porter stdio                       # STDIO bridge for Claude Desktop
#
# Porter watches porter.toml for changes and hot-reloads automatically.


# ─── Listen ─────────────────────────────────────────────────────────────────
#
# Default bind address and port for `porter serve`. CLI flags --host and
# --port override these values when provided.

# [listen]
# host = "127.0.0.1"    # Bind address (use "0.0.0.0" for all interfaces)
# port = 3000            # HTTP port for `porter serve`


# ─── MCP Servers ─────────────────────────────────────────────────────────────
#
# Wrap external MCP servers (STDIO or HTTP transport) behind Porter's
# unified endpoint. Each server's tools are namespaced by slug to
# prevent name collisions.

[servers.filesystem]
slug = "fs"
transport = "stdio"
command = "mcp-server-filesystem"
args = ["/home/user/projects"]

# [servers.github-mcp]
# slug = "gh-mcp"
# transport = "stdio"
# command = "gh-mcp"
# env.GITHUB_TOKEN = "${GITHUB_TOKEN}"
# handshake_timeout_secs = 60

# [servers.context7]
# slug = "c7"
# transport = "http"
# url = "https://mcp.context7.com/mcp"


# ─── Tool Access Gate (allow / deny) ─────────────────────────────────────────
#
# Every server accepts optional `allow` and `deny` lists that gate which of its
# tools Porter exposes. The gate is enforced in BOTH directions: denied tools
# are hidden from the aggregated tool listing AND rejected before any call is
# forwarded to the downstream server.
#
#   allow = ["get_*", "search_*"]   # if present, ONLY matching tools pass
#   deny  = ["*delete*", "merge_*"] # matching tools are always blocked
#
# Matching is applied to the downstream (un-namespaced) tool name. Each entry is
# an exact name or a simple glob:
#
#   name       exact match          (e.g. "merge_pull_request")
#   prefix*    prefix match         (e.g. "jira_get_*")
#   *suffix    suffix match         (e.g. "*_issue")
#   *inner*    substring match      (e.g. "*delete*")
#
# A tool is permitted iff (allow is omitted OR it matches an allow entry) AND
# it matches NO deny entry. Deny always wins over allow — a tool listed in both
# is blocked (Porter logs a warning at startup). With no allow/deny configured,
# every backend tool is proxied; an explicit `allow = []` blocks every tool.
#
#
# ─── Use-Case Recipes: Project Management & Code Review MCPs ──────────────────
#
# Pre-baked configs for connecting AI agents to project management and code
# review platforms via MCP servers. Uncomment a block and set the required
# environment variables to get started.
#
# ACCESS TIERS — Each recipe groups tools into tiers. The recipes below ship a
# `deny` list that BLOCKS the DESTRUCTIVE and CODE-WRITE tiers by default; READ
# and FEEDBACK tools stay enabled. To expose a blocked tool, delete its line
# from that server's `deny` list.
#
#   READ        (enabled)   Search, list, get, view, diff — passive observation.
#                           No side effects.
#
#   FEEDBACK    (enabled)   Create issues, add comments, update labels/status,
#                           create docs — how AI agents participate in workflows
#                           without destructive side effects.
#
#   DESTRUCTIVE (denied)    Delete, merge, close, archive — irreversible or
#                           high-impact actions best left to humans. Opt in by
#                           removing the tool from `deny`.
#
#   CODE WRITE  (denied)    Push files, create branches, fork repos — significant
#                           mutations to source code. Opt in by removing the tool
#                           from `deny`.


# ─── GitHub (via @modelcontextprotocol/server-github) ─────────────────────────
#
# Install: npm install -g @modelcontextprotocol/server-github
# Auth:    export GITHUB_TOKEN=ghp_...  (needs repo scope; add project scope
#          for Projects, admin:org for org operations)
# Docs:    https://github.com/modelcontextprotocol/servers/tree/main/src/github
#
# READ tools:
#   get_file_contents           — read file/directory contents
#   search_repositories         — search repos by query
#   search_code                 — search code across repos
#   search_issues               — search issues and PRs
#   search_users                — search GitHub users
#   get_issue                   — get issue details
#   get_pull_request            — get PR details
#   get_pull_request_files      — list files changed in a PR
#   get_pull_request_status     — get PR review/check status
#   get_pull_request_comments   — get PR review comments
#   get_pull_request_reviews    — get PR reviews
#   list_issues                 — list issues in a repo
#   list_commits                — list branch commits
#   get_commit                  — get commit details
#   list_branches               — list repo branches
#
# FEEDBACK tools:
#   create_issue                — open a new issue
#   add_issue_comment           — comment on an issue
#   update_issue                — update issue title/body/state/labels
#   create_pull_request_review  — submit a PR review
#
# DESTRUCTIVE tools (opt-in):
#   merge_pull_request          — merge a PR (irreversible)
#
# CODE WRITE tools (opt-in):
#   create_or_update_file       — create/update a file in a repo
#   push_files                  — push multiple files in a commit
#   create_repository           — create a new repo
#   fork_repository             — fork a repo
#   create_branch               — create a branch
#   create_pull_request         — open a PR

# [servers.github]
# slug = "github"
# transport = "stdio"
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-github"]
# env.GITHUB_PERSONAL_ACCESS_TOKEN = "${GITHUB_TOKEN}"
# # Block the DESTRUCTIVE + CODE-WRITE tiers (READ + FEEDBACK stay enabled).
# deny = [
#   "merge_pull_request",       # DESTRUCTIVE
#   "create_or_update_file",    # CODE WRITE
#   "push_files",               # CODE WRITE
#   "create_repository",        # CODE WRITE
#   "fork_repository",          # CODE WRITE
#   "create_branch",            # CODE WRITE
#   "create_pull_request",      # CODE WRITE
# ]


