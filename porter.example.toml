# ─── Use-Case Recipes: Cloud Infrastructure MCPs ─────────────────────────────
#
# Cloud providers expose infrastructure through MCP servers. Unlike the
# per-operation tools above, some cloud servers front their ENTIRE API behind a
# single generic "execute this command" tool. Porter's allow/deny gate works on
# tool NAMES, so it cannot tell a read (`aws s3 ls`) from a write (`aws s3 rb`)
# when both ride inside one tool — for those servers, read-only MUST be enforced
# by the downstream server's own switch, not by Porter's name gate.


# ─── AWS (via awslabs.aws-api-mcp-server) ────────────────────────────────────
#
# Install: uv tool install awslabs.aws-api-mcp-server  (or run with uvx)
# Auth:    export AWS_PROFILE=your-profile  (or standard AWS_ACCESS_KEY_ID /
#          AWS_SECRET_ACCESS_KEY / AWS_SESSION_TOKEN credentials)
# Docs:    https://awslabs.github.io/mcp/servers/aws-api-mcp-server
#
# Tools (all AWS access flows through `call_aws`):
#   suggest_aws_commands        — suggest CLI commands for a natural-language query (READ)
#   call_aws                    — execute an AWS CLI command (READ **or** WRITE,
#                                 depending on the command string)
#
# READ-ONLY ENFORCEMENT — `call_aws` can both read and mutate, so a Porter
# `deny` cannot make it read-only. Set the server's own `READ_OPERATIONS_ONLY`
# switch instead: `export READ_OPERATIONS_ONLY=true` before starting Porter.
# The env reference below forwards it to the child (Porter clears the child's
# environment, so the flag must be declared here to reach the server).

# [servers.aws]
# slug = "aws"
# transport = "stdio"
# command = "uvx"
# args = ["awslabs.aws-api-mcp-server@latest"]
# env.AWS_PROFILE = "${AWS_PROFILE}"
# env.READ_OPERATIONS_ONLY = "${READ_OPERATIONS_ONLY}"   # export READ_OPERATIONS_ONLY=true
